<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Garage | Neural Engine Diagnostics</title>
    <style>
        :root { --primary: #00d2ff; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-width: 450px; width: 100%; text-align: center; border: 1px solid #333; }
        h1 { color: var(--primary); font-size: 28px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        p.subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        
        /* НОВЫЙ ДИЗАЙН ЗОНЫ ЗАГРУЗКИ */
        .upload-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border: 2px dashed var(--primary); 
            background: rgba(0, 210, 255, 0.05); 
            padding: 40px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-bottom: 20px; 
        }
        .upload-area:hover { 
            background: rgba(0, 210, 255, 0.15); 
            border-color: #00a8cc; 
            transform: scale(1.02);
        }
        .upload-icon { font-size: 40px; margin-bottom: 15px; }
        #fileLabel { font-weight: bold; font-size: 16px; line-height: 1.4; color: #fff; }
        #fileSubLabel { display: block; font-size: 12px; color: #aaa; font-weight: normal; margin-top: 5px; }
        
        /* ЖЕЛЕЗОБЕТОННОЕ СКРЫТИЕ СТАНДАРТНОЙ КНОПКИ */
        .hidden-input { display: none !important; opacity: 0; position: absolute; z-index: -1; }
        
        .btn { background: var(--primary); color: #000; border: none; padding: 16px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background: #00a8cc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,210,255,0.3); }
        .btn:disabled { background: #444; cursor: not-allowed; }

        #result-card { display: none; margin-top: 30px; text-align: left; background: #252525; padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary); animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .res-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; }
        .res-val { font-weight: bold; color: var(--primary); }

        .bar-group { margin-top: 20px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; color: #aaa; }
        .bar-bg { background: #333; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
        .bar-fill { height: 100%; background: var(--primary); width: 0; transition: width 1s ease-out; }
        .bar-fill.danger { background: #ff4757; }
        .bar-fill.success { background: #2ed573; }

        .advice-box { background: #1a3a4a; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #2980b9; }
        .amazon-link { display: block; background: #ff9900; color: #000; text-decoration: none; padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .amazon-link:hover { background: #e68a00; }
        
        #loading { display: none; margin: 20px 0; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI-GARAGE</h1>
    <p class="subtitle">Diagnostic Engine Analysis System</p>

    <form id="uploadForm">
        <label class="upload-area" for="audioFile">
            <div class="upload-icon">🎙️</div>
            <span id="fileLabel">Tap to Select Audio</span>
            <span id="fileSubLabel">Supports WAV, AAC, MP3, M4A</span>
            <input type="file" id="audioFile" name="file" accept="audio/*" class="hidden-input" required>
        </label>
        <button type="submit" id="submitBtn" class="btn">Start AI Scan</button>
    </form>

    <div id="loading">⚡ PROCESSING...</div>

    <div id="result-card">
        <div class="res-row">
            <span>Diagnosis:</span>
            <span id="res-type" class="res-val">-</span>
        </div>
        <div class="res-row">
            <span>Estimated RPM:</span>
            <span id="res-rpm" class="res-val">-</span>
        </div>

        <div class="bar-group" id="probability-bars"></div>

        <div class="advice-box">
            <div style="font-size: 12px; color: var(--primary); margin-bottom: 5px;">🔧 AI RECOMMENDATION:</div>
            <div id="res-rec" style="font-size: 14px; line-height: 1.4;"></div>
            <a id="amazon-btn" href="#" target="_blank" class="amazon-link">🛒 FIND PARTS ON AMAZON</a>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('audioFile');
    const fileLabel = document.getElementById('fileLabel');
    const fileSubLabel = document.getElementById('fileSubLabel');
    const uploadForm = document.getElementById('uploadForm');
    const loading = document.getElementById('loading');
    const resultCard = document.getElementById('result-card');

    fileInput.onchange = (e) => {
        if (e.target.files[0]) {
            fileLabel.innerText = "📄 " + e.target.files[0].name;
            fileSubLabel.style.display = 'none';
        }
    };

    function audioBufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels,
            length = buffer.length * numOfChan * 2 + 44,
            bufferWav = new ArrayBuffer(length),
            view = new DataView(bufferWav),
            channels = [], i, sample, offset = 0, pos = 0;

        function setUint16(data) { view.setUint16(offset, data, true); offset += 2; }
        function setUint32(data) { view.setUint32(offset, data, true); offset += 4; }

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);

        for(i = 0; i < numOfChan; i++) channels.push(buffer.getChannelData(i));

        while(pos < buffer.length) {
            for(i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][pos]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0;
                view.setInt16(offset, sample, true);
                offset += 2;
            }
            pos++;
        }
        return new Blob([bufferWav], {type: "audio/wav"});
    }

    uploadForm.onsubmit = async (e) => {
        e.preventDefault();
        
        loading.style.display = 'block';
        resultCard.style.display = 'none';
        document.getElementById('submitBtn').disabled = true;

        try {
            const file = fileInput.files[0];
            
            loading.innerText = '⚡ PREPARING AUDIO FORMAT...';
            const arrayBuffer = await file.arrayBuffer();
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            const wavBlob = audioBufferToWav(audioBuffer);

            loading.innerText = '⚡ ANALYZING SPECTROMETER DATA...';
            const formData = new FormData();
            formData.append("file", wavBlob, "converted.wav");

            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            
            if (data.error) throw new Error(data.error);

            document.getElementById('res-type').innerText = data.type.replace('_', ' ').toUpperCase();
            document.getElementById('res-rpm').innerText = data.rpm;
            document.getElementById('res-rec').innerText = data.recommendation;

            // ЗДЕСЬ МАГИЯ: берем готовую ссылку от сервера с твоим партнерским ID
            if (data.amazon_link) {
                document.getElementById('amazon-btn').href = data.amazon_link;
                document.getElementById('amazon-btn').style.display = 'block';
            } else {
                document.getElementById('amazon-btn').style.display = 'none';
            }

            const barsContainer = document.getElementById('probability-bars');
            barsContainer.innerHTML = '';
            
            for (const [name, prob] of Object.entries(data.probabilities)) {
                const colorClass = name === 'normal_operation' ? 'success' : (prob > 40 ? 'danger' : '');
                const cleanName = name.replace('_', ' ');
                barsContainer.innerHTML += `
                    <div class="bar-label"><span>${cleanName}</span><span>${prob}%</span></div>
                    <div class="bar-bg"><div class="bar-fill ${colorClass}" style="width: ${prob}%"></div></div>
                `;
            }

            resultCard.style.display = 'block';
        } catch (err) {
            alert("Error: " + err.message + " (Make sure it's a valid audio file)");
        } finally {
            loading.style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }
    };
</script>

</body>
</html>
