<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Garage | Engine Sound Diagnostics</title>
    <style>
        /* Современный темный дизайн "под гараж/диагностику" */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #00d2ff;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        input[type="file"] {
            display: none;
        }
        .file-upload-label {
            display: inline-block;
            background-color: #333;
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px dashed #555;
            transition: 0.3s;
            width: 80%;
        }
        .file-upload-label:hover {
            border-color: #00d2ff;
            background-color: #2a2a2a;
        }
        .submit-btn {
            background-color: #00d2ff;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            width: 100%;
        }
        .submit-btn:hover {
            background-color: #00a8cc;
        }
        #loading {
            display: none;
            margin-top: 25px;
            color: #f39c12;
            font-weight: bold;
        }
        #result-card {
            display: none;
            margin-top: 30px;
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #00d2ff;
            text-align: left;
        }
        .result-item {
            margin: 10px 0;
            font-size: 18px;
        }
        .highlight {
            color: #00d2ff;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        /* НОВЫЕ СТИЛИ ДЛЯ ГРАФИКОВ-ШКАЛ */
        .bars-wrapper { margin-top: 15px; }
        .bar-row { margin-bottom: 12px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; color: #ccc;}
        .bar-container { background-color: #333; border-radius: 4px; overflow: hidden; height: 8px; }
        .bar-fill { height: 100%; background-color: #00d2ff; width: 0%; transition: width 1s ease-in-out; }
        .bar-fill.high { background-color: #ff4757; } /* Красный для опасных вероятностей */
        .bar-fill.med { background-color: #ffa502; } /* Желтый для средних */
    </style>
</head>
<body>

    <div class="container">
        <h1>AI-Garage</h1>
        <p class="subtitle">Neural Network Engine Sound Analysis</p>

        <form id="uploadForm">
            <label class="file-upload-label" for="audioFile" id="fileLabel">
                📁 Click to Select Audio/Video File
            </label>
            <input type="file" id="audioFile" name="file" accept="audio/*,video/*" required>
            
            <button type="submit" class="submit-btn">Run AI Analysis</button>
        </form>

        <div id="loading">⏳ Analyzing sound frequencies... Please wait.</div>

        <div id="result-card">
            <div class="result-item">Primary Diagnosis: <span id="res-type" class="highlight"></span></div>
            <div class="result-item">Detected RPM: <span id="res-rpm" style="color: #fff;"></span></div>
            
            <h3 style="margin-top: 20px; color: #888; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px;">Diagnostic Confidence Scale</h3>
            <div id="probability-bars" class="bars-wrapper">
                </div>
        </div>
    </div>

    <script>
        document.getElementById('audioFile').addEventListener('change', function(e) {
            let fileName = e.target.files[0].name;
            document.getElementById('fileLabel').innerText = "📄 " + fileName;
        });

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let fileInput = document.getElementById('audioFile');
            if (fileInput.files.length === 0) return;

            let formData = new FormData();
            formData.append("file", fileInput.files[0]);

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result-card').style.display = 'none';

            try {
                let response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                let data = await response.json();
                document.getElementById('loading').style.display = 'none';

                if (data.error) {
                    alert("Error: " + data.error);
                    return;
                }

                // Очищаем контейнер перед новой отрисовкой
                let barsContainer = document.getElementById('probability-bars');
                barsContainer.innerHTML = '';

                // Отрисовываем новые красивые шкалы
                if (data.probabilities) {
                    for (const [issue, percent] of Object.entries(data.probabilities)) {
                        // Убираем подчеркивания и делаем первую букву большой
                        let cleanName = issue.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        
                        // Выбираем цвет: больше 60% красный, больше 30% желтый
                        let colorClass = percent >= 60 ? 'high' : (percent >= 30 ? 'med' : '');

                        let barHtml = `
                            <div class="bar-row">
                                <div class="bar-label">
                                    <span>${cleanName}</span>
                                    <span>${percent}%</span>
                                </div>
                                <div class="bar-container">
                                    <div class="bar-fill ${colorClass}" style="width: ${percent}%"></div>
                                </div>
                            </div>
                        `;
                        barsContainer.innerHTML += barHtml;
                    }
                }

                // Заполняем основные данные
                let displayType = data.type.replace(/_/g, ' ').toUpperCase();
                document.getElementById('res-type').innerText = displayType;
                document.getElementById('res-rpm').innerText = data.rpm;
                
                document.getElementById('result-card').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                alert("Something went wrong with the connection.");
            }
        });
    </script>
</body>
</html>
