<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Garage | Expert Engine Analysis</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding-top: 50px;}
        .container { background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-width: 450px; width: 100%; text-align: center; }
        h1 { color: #00d2ff; }
        .file-label { display: block; background: #333; padding: 20px; border: 2px dashed #555; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result-card { display: none; margin-top: 25px; text-align: left; background: #2a2a2a; padding: 20px; border-radius: 8px; border-left: 4px solid #00d2ff; }
        .bar-container { background: #444; height: 10px; border-radius: 5px; margin-bottom: 15px; overflow: hidden; }
        .bar-fill { height: 100%; background: #00d2ff; width: 0; transition: width 1s; }
        .bar-fill.safe { background: #2ed573; }
        .bar-fill.warn { background: #ff4757; }
        .amazon-btn { display: block; background: #ff9900; color: #000; text-decoration: none; padding: 12px; border-radius: 5px; font-weight: bold; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI-Garage</h1>
        <p>Upload a <b>.WAV</b> file for AI diagnostics</p>
        <form id="uploadForm">
            <label class="file-label" for="audioFile" id="fileLabel">📁 Click to select audio</label>
            <input type="file" id="audioFile" name="file" accept=".wav" style="display:none" required>
            <button type="submit" class="btn">START ANALYSIS</button>
        </form>
        <div id="loading" style="display:none; margin-top:20px;">⏳ Analyzing...</div>
        <div id="result-card">
            <h3>Result: <span id="res-type" style="color:#00d2ff"></span></h3>
            <p>Detected RPM: <b id="res-rpm"></b></p>
            <div id="bars"></div>
            <div style="background:#1a3a4a; padding:15px; border-radius:5px; margin-top:15px;">
                <small>Expert Advice:</small>
                <p id="res-rec" style="font-size:14px; margin:5px 0;"></p>
                <a id="amazon-link" href="#" target="_blank" class="amazon-btn">Find Parts on Amazon</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('audioFile').onchange = e => { document.getElementById('fileLabel').innerText = "📄 " + e.target.files[0].name; };
        document.getElementById('uploadForm').onsubmit = async e => {
            e.preventDefault();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result-card').style.display = 'none';
            let formData = new FormData();
            formData.append("file", document.getElementById('audioFile').files[0]);
            let res = await fetch('/analyze', { method: 'POST', body: formData });
            let data = await res.json();
            document.getElementById('loading').style.display = 'none';
            if(data.error) { alert(data.error); return; }
            document.getElementById('res-type').innerText = data.type.replace('_',' ').toUpperCase();
            document.getElementById('res-rpm').innerText = data.rpm;
            document.getElementById('res-rec').innerText = data.recommendation;
            document.getElementById('amazon-link').href = "https://www.amazon.com/s?k=" + data.type.replace('_','+') + "+repair+parts";
            let barsHtml = '';
            for (const [name, val] of Object.entries(data.probabilities)) {
                let color = (name === 'normal_operation') ? 'safe' : (val > 50 ? 'warn' : '');
                barsHtml += `<small>${name.replace('_',' ')}: ${val}%</small><div class="bar-container"><div class="bar-fill ${color}" style="width:${val}%"></div></div>`;
            }
            document.getElementById('bars').innerHTML = barsHtml;
            document.getElementById('result-card').style.display = 'block';
        };
    </script>
</body>
</html>
